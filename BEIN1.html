
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>Sonu // Live Stream</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
video{width:100%;height:100%;object-fit:contain;background:#000}
video.mode-fill{object-fit:fill}
video.mode-cover{object-fit:cover}
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}
.shaka-fit-btn{background:transparent!important;border:none!important;cursor:pointer!important;padding:0 10px!important;opacity:.85;display:flex;align-items:center;justify-content:center;height:100%;transition:opacity .15s}
.shaka-fit-btn:hover{opacity:1}
.shaka-fit-btn svg{width:18px;height:18px;display:block}
#loader{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9;opacity:0;pointer-events:none;transition:opacity .2s}
#loader.on{opacity:1}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#38bdf8;border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="shaka-video-container" id="pc">
  <video id="v" autoplay playsinline preload="metadata"></video>
  <div id="loader"><div class="spin"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) return;

  const video     = document.getElementById('v');
  const container = document.getElementById('pc');
  const loader    = document.getElementById('loader');

  let playing = false;
  const showLoader = () => { if (playing) loader.classList.add('on'); };
  const hideLoader = () => { playing = true; loader.classList.remove('on'); };

  video.addEventListener('waiting',    showLoader);
  video.addEventListener('stalled',    showLoader);
  video.addEventListener('seeking',    showLoader);
  video.addEventListener('playing',    hideLoader);
  video.addEventListener('canplay',    hideLoader);
  video.addEventListener('timeupdate', () => { if (!video.paused && video.currentTime > 0) hideLoader(); });

  const player = new shaka.Player();
  await player.attach(video);

  const ui = new shaka.ui.Overlay(player, container, video);
  ui.configure({
    controlPanelElements: ['play_pause','time_and_duration','spacer','quality','fullscreen','overflow_menu'],
    overflowMenuButtons:  ['language','captions','playback_rate','picture_in_picture'],
    seekBarColors: { base:'rgba(209,213,219,.25)', buffered:'rgba(139,0,0,.45)', played:'#22c55e' },
    fadeDelay: 3
  });

  const STREAM_URL = 'https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/ghwcl6hv68/out/v1/83536910d8034e9b9895a20fbe1c1687/cenc.mpd';
  const RAW_KEYS = '335dad778109954503dcbb21dc92015f:24bfd75d436cbf73168a2a2dccd40281';
  const clearKeys = Object.fromEntries(
    RAW_KEYS.split(',').map(pair => pair.trim().split(':'))
  );

  player.configure({
    drm: { clearKeys },
    manifest: {
      defaultPresentationDelay: 4,
      ignoreTextStreamFailures: true,
      dash: { autoCorrectDrift: true, ignoreMinBufferTime: true }
    },
    abr: {
      enabled: true,
      defaultBandwidthEstimate: 2000000,
      bandwidthUpgradeTarget: 0.85,
      bandwidthDowngradeTarget: 0.95,
      restrictions: { maxHeight: 1080 }
    }
  });
  player.configurationForLowLatency({
    streaming: {
      inaccurateManifestTolerance: 0,
      segmentPrefetchLimit: 2,
      updateIntervalSeconds: 0.1,
      maxDisabledTime: 1,
      bufferingGoal: 10,
      rebufferingGoal: 2,
      bufferBehind: 30,
      safeSeekOffset: 3,
      retryParameters: { baseDelay: 100, maxAttempts: 5, backoffFactor: 1.5, fuzzFactor: 0.5 }
    },
    manifest: {
      dash: { autoCorrectDrift: true },
      retryParameters: { baseDelay: 100 }
    },
    drm: {
      retryParameters: { baseDelay: 100 }
    }
  });

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers['Referer']    = 'https://www.otte.live.fly.ww.aiv-cdn.net/';
    request.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 10; SM-G973F) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36';
  });

  try { await player.load(STREAM_URL); } catch (_) {}

  const MODES = ['contain','fill','cover'];
  const ICONS = {
    contain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="21" x2="22" y2="21"/></svg>',
    fill:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>',
    cover:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 7l3 3m0 0H7m2 0V8m9-1l-3 3m0 0h2m-2 0V8M6 13l3-3m0 0H7m2 0v2m9 1l-3-3m0 0h2m-2 0v2"/></svg>'
  };
  let modeIdx = 0;

  function injectFitButton(cnt, vid) {
    const poll = setInterval(() => {
      const panel = cnt.querySelector('.shaka-controls-button-panel');
      if (!panel) return;
      clearInterval(poll);
      const btn = document.createElement('button');
      btn.className = 'shaka-fit-btn';
      btn.title     = 'Toggle fit mode';
      btn.innerHTML = ICONS.contain;
      const anchor = panel.querySelector('.shaka-fullscreen-button');
      if (anchor) panel.insertBefore(btn, anchor); else panel.appendChild(btn);
      function applyMode(idx) {
        modeIdx = idx;
        const m = MODES[idx];
        vid.classList.remove('mode-fill','mode-cover');
        if (m === 'fill')  vid.classList.add('mode-fill');
        if (m === 'cover') vid.classList.add('mode-cover');
        btn.innerHTML = ICONS[m];
      }
      btn.addEventListener('click', e => { e.stopPropagation(); applyMode((modeIdx + 1) % MODES.length); });
      ['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
        document.addEventListener(ev, () => {
          if (!(document.fullscreenElement || document.webkitFullscreenElement)) applyMode(0);
        });
      });
    }, 50);
  }

  injectFitButton(container, video);
});
</script>
</body>
</html>
